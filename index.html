<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Studio</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0a192f;
      color: #e0e6ed;
    }

    header {
      padding: 2rem;
      text-align: center;
      background: linear-gradient(135deg, #112240, #0a192f);
    }

    h1 {
      margin: 0;
      color: #64ffda;
      letter-spacing: 0.08em;
    }

    .controls, .track {
      max-width: 900px;
      margin: 1rem auto;
      padding: 1rem;
      background: #112240;
      border: 1px solid rgba(100,255,218,0.25);
      border-radius: 16px;
    }

    button {
      background: #64ffda;
      color: #0a192f;
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      margin: 0.25rem;
    }

    button.stop {
      background: #e29625;
    }

    .track {
      display: grid;
      grid-template-columns: 120px 1fr 160px;
      gap: 1rem;
      align-items: center;
    }

    .track-name {
      font-weight: 700;
      color: #64ffda;
    }

    input[type="file"] {
      color: #e0e6ed;
    }

    input[type="range"] {
      width: 100%;
    }

    .status {
      opacity: 0.75;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .track {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Signal Studio</h1>
  <p>A tiny browser DAW prototype</p>
</header>

<section class="controls">
  <button id="playBtn">Play</button>
  <button id="stopBtn" class="stop">Stop</button>

  <label>
    <input type="checkbox" id="loopToggle" checked />
    Loop clips
  </label>

  <p class="status" id="status">Load audio clips to begin.</p>
</section>

<main id="tracks"></main>

<script>
  const trackCount = 4;
  const tracksEl = document.getElementById("tracks");
  const statusEl = document.getElementById("status");
  const playBtn = document.getElementById("playBtn");
  const stopBtn = document.getElementById("stopBtn");
  const loopToggle = document.getElementById("loopToggle");

  let audioContext;
  let tracks = [];
  let activeSources = [];

  function createTrack(index) {
    const track = {
      name: `Track ${index + 1}`,
      buffer: null,
      gainNode: null,
      volume: 0.8,
      fileName: "No clip loaded"
    };

    tracks.push(track);

    const el = document.createElement("section");
    el.className = "track";

    el.innerHTML = `
      <div>
        <div class="track-name">${track.name}</div>
        <div class="status" id="file-${index}">${track.fileName}</div>
      </div>

      <input type="file" accept="audio/*" id="upload-${index}" />

      <div>
        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.01" value="0.8" id="volume-${index}" />
      </div>
    `;

    tracksEl.appendChild(el);

    document.getElementById(`upload-${index}`).addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      await ensureAudioContext();

      const arrayBuffer = await file.arrayBuffer();
      const decodedAudio = await audioContext.decodeAudioData(arrayBuffer);

      track.buffer = decodedAudio;
      track.fileName = file.name;

      document.getElementById(`file-${index}`).textContent = file.name;
      statusEl.textContent = `${file.name} loaded.`;
    });

    document.getElementById(`volume-${index}`).addEventListener("input", (event) => {
      track.volume = Number(event.target.value);

      if (track.gainNode) {
        track.gainNode.gain.value = track.volume;
      }
    });
  }

  async function ensureAudioContext() {
    if (!audioContext) {
      audioContext = new AudioContext();
    }

    if (audioContext.state === "suspended") {
      await audioContext.resume();
    }
  }

  async function playAll() {
    await ensureAudioContext();
    stopAll();

    const loop = loopToggle.checked;
    let loadedCount = 0;

    tracks.forEach((track) => {
      if (!track.buffer) return;

      const source = audioContext.createBufferSource();
      const gainNode = audioContext.createGain();

      source.buffer = track.buffer;
      source.loop = loop;

      gainNode.gain.value = track.volume;

      source.connect(gainNode);
      gainNode.connect(audioContext.destination);

      source.start();

      track.gainNode = gainNode;
      activeSources.push(source);
      loadedCount++;
    });

    statusEl.textContent = loadedCount
      ? `Playing ${loadedCount} clip(s).`
      : "No clips loaded yet.";
  }

  function stopAll() {
    activeSources.forEach((source) => {
      try {
        source.stop();
      } catch (error) {}
    });

    activeSources = [];
    tracks.forEach(track => track.gainNode = null);

    statusEl.textContent = "Stopped.";
  }

  playBtn.addEventListener("click", playAll);
  stopBtn.addEventListener("click", stopAll);

  for (let i = 0; i < trackCount; i++) {
    createTrack(i);
  }
</script>

</body>
</html>
