<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Signal Studio // Infernal Build</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at top, rgba(255,0,90,0.08), transparent 40%),
    linear-gradient(180deg, #05010a, #0d0216 50%, #030104);
  color: #f4d8ff;
  font-family: "Segoe UI", sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 100% 4px;
  opacity: 0.15;
  animation: scan 10s linear infinite;
}

@keyframes scan {
  from { transform: translateY(0); }
  to { transform: translateY(4px); }
}

header {
  text-align: center;
  padding: 2rem 1rem;
}

h1 {
  margin: 0;
  font-size: clamp(2rem, 5vw, 4rem);
  letter-spacing: 0.2em;
  color: #ff2d95;
  text-shadow:
    0 0 10px #ff2d95,
    0 0 20px #ff2d95,
    0 0 40px rgba(255,45,149,0.5);
}

.subtitle {
  margin-top: 1rem;
  color: #9f8bb7;
  letter-spacing: 0.08em;
}

.container {
  width: min(1200px, 95%);
  margin: auto;
  padding-bottom: 4rem;
}

.transport {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  align-items: center;
  justify-content: center;
  margin-bottom: 2rem;
  padding: 1rem;
  border-radius: 20px;
  background: rgba(18, 6, 26, 0.85);
  border: 1px solid rgba(255,45,149,0.25);
  backdrop-filter: blur(10px);
  box-shadow:
    0 0 30px rgba(255,45,149,0.08),
    inset 0 0 20px rgba(255,255,255,0.02);
}

button {
  border: none;
  cursor: pointer;
  padding: 0.8rem 1.3rem;
  border-radius: 999px;
  font-weight: bold;
  letter-spacing: 0.08em;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
}

.play-btn {
  background: linear-gradient(135deg, #ff2d95, #ff6b3d);
  color: white;
  box-shadow: 0 0 20px rgba(255,45,149,0.35);
}

.stop-btn {
  background: #2b0d1d;
  color: #ff8dc0;
  border: 1px solid rgba(255,45,149,0.4);
}

.track {
  background: rgba(14, 5, 20, 0.9);
  border: 1px solid rgba(255,45,149,0.18);
  border-radius: 24px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  box-shadow:
    0 0 20px rgba(255,45,149,0.06),
    inset 0 0 20px rgba(255,255,255,0.015);
}

.track-top {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 1rem;
}

.track-name {
  font-size: 1.2rem;
  font-weight: bold;
  color: #ff7db7;
  letter-spacing: 0.08em;
}

.track-controls {
  display: flex;
  gap: 0.5rem;
}

.small-btn {
  background: #1d0b26;
  color: #e8c6ff;
  border: 1px solid rgba(255,45,149,0.2);
  padding: 0.5rem 0.8rem;
}

.small-btn.active {
  background: #ff2d95;
  color: white;
  box-shadow: 0 0 15px rgba(255,45,149,0.4);
}

.track-bottom {
  display: grid;
  grid-template-columns: 1fr 200px 160px;
  gap: 1rem;
  margin-top: 1rem;
  align-items: center;
}

input[type="file"] {
  color: #d8c0f0;
}

input[type="range"] {
  width: 100%;
}

select {
  background: #12061a;
  color: #f3d7ff;
  border: 1px solid rgba(255,45,149,0.25);
  padding: 0.7rem;
  border-radius: 12px;
}

.status {
  text-align: center;
  margin-top: 1rem;
  color: #bba2cf;
  opacity: 0.8;
}

.glow {
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0%,100% {
    box-shadow: 0 0 12px rgba(255,45,149,0.3);
  }
  50% {
    box-shadow: 0 0 25px rgba(255,45,149,0.7);
  }
}

@media (max-width: 850px) {
  .track-bottom {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>SIGNAL STUDIO</h1>
  <div class="subtitle">
    Infernal Cyber Audio Engine
  </div>
</header>

<div class="container">

  <div class="transport glow">
    <button class="play-btn" id="playBtn">PLAY</button>
    <button class="stop-btn" id="stopBtn">STOP</button>

    <label>
      <input type="checkbox" id="loopToggle" checked />
      LOOP
    </label>
  </div>

  <div id="tracks"></div>

  <div class="status" id="status">
    Awaiting audio signal...
  </div>

</div>

<script>
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

const tracksContainer = document.getElementById("tracks");
const statusEl = document.getElementById("status");

const tracks = [];
let activeSources = [];

const sampleLibrary = {
  "Sine Drone": createToneBuffer(110, 2),
  "Dark Pulse": createPulseBuffer(70, 1.5),
  "Infernal Bass": createToneBuffer(55, 2),
  "Noise Wash": createNoiseBuffer(2)
};

function createTrack(index) {
  const track = {
    buffer: null,
    volume: 0.8,
    muted: false,
    solo: false,
    gainNode: null
  };

  tracks.push(track);

  const el = document.createElement("div");
  el.className = "track";

  el.innerHTML = `
    <div class="track-top">
      <div class="track-name">TRACK ${index + 1}</div>

      <div class="track-controls">
        <button class="small-btn mute-btn">MUTE</button>
        <button class="small-btn solo-btn">SOLO</button>
      </div>
    </div>

    <div class="track-bottom">
      <input type="file" accept="audio/*" class="file-input" />

      <select class="sample-select">
        <option value="">Built-in Samples</option>
        <option>Sine Drone</option>
        <option>Dark Pulse</option>
        <option>Infernal Bass</option>
        <option>Noise Wash</option>
      </select>

      <div>
        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.01" value="0.8" class="volume-slider" />
      </div>
    </div>
  `;

  tracksContainer.appendChild(el);

  const muteBtn = el.querySelector(".mute-btn");
  const soloBtn = el.querySelector(".solo-btn");
  const fileInput = el.querySelector(".file-input");
  const sampleSelect = el.querySelector(".sample-select");
  const volumeSlider = el.querySelector(".volume-slider");

  muteBtn.addEventListener("click", () => {
    track.muted = !track.muted;
    muteBtn.classList.toggle("active", track.muted);
  });

  soloBtn.addEventListener("click", () => {
    track.solo = !track.solo;
    soloBtn.classList.toggle("active", track.solo);
  });

  volumeSlider.addEventListener("input", (e) => {
    track.volume = Number(e.target.value);

    if (track.gainNode) {
      track.gainNode.gain.value = track.volume;
    }
  });

  sampleSelect.addEventListener("change", () => {
    const sampleName = sampleSelect.value;

    if (sampleLibrary[sampleName]) {
      track.buffer = sampleLibrary[sampleName];
      statusEl.textContent = `${sampleName} loaded into TRACK ${index + 1}`;
    }
  });

  fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const arrayBuffer = await file.arrayBuffer();
    const decoded = await audioContext.decodeAudioData(arrayBuffer);

    track.buffer = decoded;

    statusEl.textContent = `${file.name} loaded into TRACK ${index + 1}`;
  });
}

function createToneBuffer(freq, duration) {
  const sampleRate = audioContext.sampleRate;
  const buffer = audioContext.createBuffer(1, sampleRate * duration, sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    data[i] = Math.sin((i / sampleRate) * freq * Math.PI * 2) * 0.3;
  }

  return buffer;
}

function createPulseBuffer(freq, duration) {
  const sampleRate = audioContext.sampleRate;
  const buffer = audioContext.createBuffer(1, sampleRate * duration, sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    const wave = Math.sin((i / sampleRate) * freq * Math.PI * 2);
    data[i] = wave > 0 ? 0.4 : -0.4;
  }

  return buffer;
}

function createNoiseBuffer(duration) {
  const sampleRate = audioContext.sampleRate;
  const buffer = audioContext.createBuffer(1, sampleRate * duration, sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.15;
  }

  return buffer;
}

function stopAll() {
  activeSources.forEach(source => {
    try {
      source.stop();
    } catch {}
  });

  activeSources = [];
}

async function playAll() {
  await audioContext.resume();

  stopAll();

  const loop = document.getElementById("loopToggle").checked;

  const anySolo = tracks.some(t => t.solo);

  tracks.forEach(track => {
    if (!track.buffer) return;

    if (track.muted) return;

    if (anySolo && !track.solo) return;

    const source = audioContext.createBufferSource();
    const gainNode = audioContext.createGain();

    source.buffer = track.buffer;
    source.loop = loop;

    gainNode.gain.value = track.volume;

    source.connect(gainNode);
    gainNode.connect(audioContext.destination);

    source.start();

    track.gainNode = gainNode;

    activeSources.push(source);
  });

  statusEl.textContent = "Audio signal active...";
}

document.getElementById("playBtn").addEventListener("click", playAll);
document.getElementById("stopBtn").addEventListener("click", () => {
  stopAll();
  statusEl.textContent = "Signal terminated.";
});

for (let i = 0; i < 4; i++) {
  createTrack(i);
}
</script>

</body>
</html>
